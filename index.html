<!doctype html>

<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Tropem Gwarkow</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="desktopRedirectOverlay" class="desktop-redirect-overlay landing-hidden" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Desktop redirect">
      <iframe
        id="desktopRedirectFrame"
        class="desktop-redirect-frame"
        title="Desktop redirect"
        src="embeds/desktop-redirect.html"
        loading="eager"
        referrerpolicy="no-referrer"
      ></iframe>
    </div>

    <div id="landingOverlay" class="landing-overlay landing-hidden" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Welcome">
      <iframe
        id="landingOverlayFrame"
        class="landing-overlay-frame"
        title="Welcome"
        src="embeds/landing.html"
        loading="eager"
        referrerpolicy="no-referrer"
      ></iframe>
    </div>

    <!-- Location banner (hidden unless needed) -->
    <div id="locationBanner" class="banner banner-hidden" role="dialog" aria-live="polite" aria-label="Location permission">
      <span id="bannerText">
        For the full experience, please allow location access.
      </span>
      <button id="grantLocationBtn" class="banner-btn" type="button">
        Allow location
      </button>
      <button id="dismissBannerBtn" class="banner-btn banner-btn-secondary" type="button">
        Dismiss
      </button>
    </div>

    <div id="layersBanner" class="layers layers-hidden" role="dialog" aria-label="Map layers">
    <div class="layers-header">
      <!--div class="layers-handle" aria-hidden="true"></div-->
      <div class="layers-title">Map Layers</div>
    </div>

    <div class="layers-grid" role="group" aria-label="Layer options">
      <button id="styleToggleBtn" class="layer-tile" type="button">
        <span class="layer-tile-title">Base map</span>
        <span class="layer-tile-subtitle">Minimal</span>
      </button>

      <!--button id="toggleImageOverlayBtn" class="layer-tile" type="button">
        <span class="layer-tile-title">Tunnels Overlay</span>
        <span class="layer-tile-subtitle">Off</span>
      </button-->
    </div>
  </div>
 

    <div id="map"></div>

    <!-- Map buttons -->
    <div class="map-controls" aria-label="Map controls">
      <button id="myLocationBtn" class="control-btn" type="button" disabled>
        <img class="control-btn-icon" src="assets/userPin.png" alt="" aria-hidden="true">
      </button>
      <button id="centerBtn" class="control-btn" type="button">
        <img class="control-btn-icon" src="assets/building_old.png" alt="" aria-hidden="true">
      </button>
      <!--button id="layersShowBtn" class="control-btn" type="button">
        <img class="control-btn-icon" src="assets/hamburgerMenu.png" alt="" aria-hidden="true">
      </button-->
    </div>

    <!-- Too far message -->
    <!--div id="distanceBanner" class="distance-banner" role="status" aria-live="polite"> 
      You&#39;re too far from the city center. 
    </div-->

    <!-- Full screen embedded page overlay -->
    <div id="poiOverlay" class="poi-overlay poi-overlay-hidden poi-overlay-inline-controls" aria-hidden="true">
      <div class="poi-overlay-bar" aria-hidden="true">
      <button id="poiOverlayClose" class="poi-overlay-close" type="button" aria-label="Close">
        Cancel
      </button>

      <button id="poiCompleteBtn" class="poi-complete-btn" type="button" aria-pressed="false">
        <span id="poiCompleteBox" class="poi-complete-box" aria-hidden="true"></span>
        <span id="poiCompleteLabel">Zakończ</span>
      </button>
    </div>
      <iframe
        id="poiOverlayFrame"
        class="poi-overlay-frame"
        title="Point of interest"
        src="about:blank"
        loading="lazy"
        allow="autoplay"
        referrerpolicy="no-referrer"
      ></iframe>
    </div>

    <div id="infoOverlay" class="poi-overlay poi-overlay-hidden" aria-hidden="true">
      <div class="poi-overlay-bar info-overlay-bar">
        <button id="infoOverlayClose" class="poi-overlay-close" type="button" aria-label="Close">
          Close
        </button>
        <div class="info-nav" role="tablist" aria-label="Information pages">
          <button id="infoCreditsBtn" class="info-nav-btn is-active" type="button" role="tab" aria-selected="true">
            Credits
          </button>
          <button id="infoAboutBtn" class="info-nav-btn" type="button" role="tab" aria-selected="false">
            About
          </button>
          <button id="infoFeatureBtn" class="info-nav-btn" type="button" role="tab" aria-selected="false">
            Contact
          </button>
        </div>
      </div>
      <iframe
        id="infoOverlayFrame"
        class="poi-overlay-frame"
        title="Information"
        src="about:blank"
        loading="lazy"
        referrerpolicy="no-referrer"
      ></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.min.js"></script>
    <script type="module" src="src/refs.js"></script>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
