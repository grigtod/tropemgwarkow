<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porozmawiaj z Gwarkiem</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
    <link rel="apple-touch-icon" href="../apple-touch-icon.png" />
    <link rel="manifest" href="../site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --gwarek-accent: #f6d300;
        --gwarek-accent-strong: #f6d300;
        --gwarek-ink: #171717;
        --gwarek-subtle: #5f5f5f;
        --gwarek-surface: #ffffff;
        --gwarek-surface-muted: #faf8ef;
        --gwarek-border: rgba(23, 23, 23, 0.1);
        --gwarek-shadow: 0 24px 48px rgba(35, 31, 15, 0.12);
        --gwarek-shadow-soft: 0 12px 28px rgba(23, 23, 23, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Public Sans", sans-serif;
        color: var(--gwarek-ink);
        background:
          radial-gradient(circle at top right, rgba(246, 211, 0, 0.22), transparent 30%),
          linear-gradient(180deg, rgba(246, 211, 0, 0.16) 0%, #fffef7 18%, #ffffff 45%);
      }

      button {
        font: inherit;
      }

      .page {
        min-height: 100vh;
        padding: 0 16px 24px;
      }

      .page-header {
        position: relative;
        z-index: 2;
        margin: 0 -16px;
        padding: 16px 16px 0;
        background: linear-gradient(180deg, rgba(246, 211, 0, 0.92), rgba(246, 211, 0, 0));
      }

      .page-header-bar {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) 44px;
        align-items: center;
        gap: 10px;
        padding: 14px 14px 10px;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(14px);
      }

      .page-header-title {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 800;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .icon-btn,
      .choice-btn,
      .secondary-btn,
      .hero-audio-btn,
      .complete-btn {
        border: 0;
        cursor: pointer;
      }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        background: transparent;
        color: var(--gwarek-ink);
      }

      .icon-btn:hover,
      .secondary-btn:hover {
        background: rgba(0, 0, 0, 0.05);
      }

      .icon-btn svg,
      .hero-audio-btn svg {
        width: 20px;
        height: 20px;
      }

      .main {
        max-width: 760px;
        margin: 0 auto;
      }

      .hero {
        position: relative;
        margin: 0 -16px;
        padding: 0 16px;
      }

      .hero-image {
        position: relative;
        min-height: 320px;
        border-left: 1px solid rgba(246, 211, 0, 0.24);
        border-right: 1px solid rgba(246, 211, 0, 0.24);
        border-bottom: 1px solid rgba(246, 211, 0, 0.24);
        border-bottom-left-radius: 22px;
        border-bottom-right-radius: 22px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: var(--gwarek-shadow);
      }

      .hero-image::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(246, 211, 0, 0.08), rgba(246, 211, 0, 0.02)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.18));
        pointer-events: none;
      }

      .hero-grid {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 20px;
        min-height: 320px;
        padding: 28px 24px 24px;
      }

      .portrait-shell {
        position: relative;
        width: min(100%, 280px);
        justify-self: center;
      }

      .portrait-shell::before {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 28px;
        border: 1px solid rgba(246, 211, 0, 0.24);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
      }

      .portrait {
        aspect-ratio: 1 / 1;
        width: 100%;
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid rgba(246, 211, 0, 0.28);
        background:
          linear-gradient(180deg, rgba(246, 211, 0, 0.14), rgba(246, 211, 0, 0)),
          #231b0f center / cover no-repeat;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }

      .portrait.is-speaking {
        animation: glow-pulse 1.9s infinite;
      }

      .hero-audio-btn {
        position: absolute;
        right: 14px;
        bottom: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255, 248, 220, 0.94);
        color: var(--gwarek-ink);
        box-shadow: 0 12px 24px rgba(23, 23, 23, 0.18);
        transition: transform 140ms ease;
      }

      .hero-audio-btn:hover,
      .choice-btn:hover,
      .complete-btn:hover {
        transform: translateY(-1px);
      }

      .hero-copy {
        align-self: end;
        color: var(--gwarek-ink);
      }

      .hero-copy p {
        margin: 16px 0 0;
        max-width: 48ch;
        color: var(--gwarek-subtle);
        line-height: 1.6;
      }

      .content {
        max-width: 760px;
        margin: 0 auto;
        padding-top: 28px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(246, 211, 0, 0.18);
        color: rgba(23, 23, 23, 0.8);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .content h1 {
        margin: 16px 0 10px;
        font-size: clamp(2rem, 6vw, 2.75rem);
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      .lede {
        margin: 0;
        color: var(--gwarek-subtle);
        font-size: 1rem;
        line-height: 1.65;
      }

      .complete-row {
        display: flex;
        margin-top: 22px;
      }

      .complete-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 20px;
        border-radius: 999px;
        background: var(--gwarek-accent);
        color: #fff;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        box-shadow: 0 12px 22px rgba(246, 211, 0, 0.34);
      }

      .complete-btn.is-complete {
        background: #171717;
        box-shadow: 0 12px 22px rgba(23, 23, 23, 0.22);
      }

      .complete-btn-icon {
        font-size: 1rem;
        line-height: 1;
      }

      .shell {
        display: grid;
        gap: 18px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--gwarek-border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.75);
        box-shadow: var(--gwarek-shadow-soft);
      }

      .transcript {
        display: grid;
        gap: 16px;
        padding: 18px 20px;
      }

      .transcript-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .transcript-top .eyebrow {
        padding: 8px 12px;
        font-size: 0.76rem;
      }

      .typing {
        display: inline-flex;
        gap: 4px;
      }

      .typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gwarek-accent);
        animation: typing-dot 1.2s infinite ease-in-out;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.16s;
      }

      .typing span:nth-child(3) {
        animation-delay: 0.32s;
      }

      .secondary-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 42px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(23, 23, 23, 0.04);
        color: var(--gwarek-ink);
      }

      .speech {
        position: relative;
        padding: 20px;
        border-radius: 18px;
        background: var(--gwarek-surface-muted);
        border: 1px solid rgba(246, 211, 0, 0.2);
      }

      .speech::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 30px;
        width: 20px;
        height: 20px;
        rotate: 45deg;
        border-top: 1px solid rgba(246, 211, 0, 0.2);
        border-left: 1px solid rgba(246, 211, 0, 0.2);
        background: var(--gwarek-surface-muted);
      }

      .speech p {
        margin: 0;
        font-size: clamp(1.04rem, 3vw, 1.22rem);
        line-height: 1.72;
      }

      .speech-quote {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
        color: rgba(246, 211, 0, 0.5);
      }

      .choices {
        display: grid;
        gap: 12px;
      }

      .choice-btn {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 16px 18px;
        border-radius: 16px;
        text-align: left;
        background: #ffffff;
        border: 1px solid rgba(23, 19, 10, 0.1);
        box-shadow: 0 12px 22px rgba(23, 19, 10, 0.06);
        transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      }

      .choice-btn:hover {
        border-color: rgba(246, 211, 0, 0.5);
        box-shadow: 0 16px 28px rgba(246, 211, 0, 0.14);
      }

      .choice-copy strong {
        display: block;
        font-size: 1rem;
        line-height: 1.35;
      }

      .choice-arrow {
        color: rgba(23, 19, 10, 0.42);
        font-size: 1.2rem;
      }

      @keyframes glow-pulse {
        0% {
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.16),
            0 0 0 0 rgba(246, 211, 0, 0.34);
        }
        70% {
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.16),
            0 0 0 18px rgba(246, 211, 0, 0);
        }
        100% {
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.16),
            0 0 0 0 rgba(246, 211, 0, 0);
        }
      }

      @keyframes typing-dot {
        0%,
        60%,
        100% {
          opacity: 0.25;
          transform: translateY(0);
        }
        30% {
          opacity: 1;
          transform: translateY(-4px);
        }
      }

      @media (min-width: 760px) {
        .hero-grid {
          grid-template-columns: 280px minmax(0, 1fr);
          align-items: center;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 0 12px 22px;
        }

        .page-header {
          margin: 0 -12px;
          padding: 12px 12px 0;
        }

        .page-header-bar {
          padding: 12px 12px 8px;
        }

        .hero {
          margin: 0 -12px;
          padding: 0 12px;
        }

        .hero-image,
        .hero-grid {
          min-height: 250px;
        }

        .hero-grid {
          padding: 20px 16px 18px;
        }

        .transcript-top {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <div class="page-header-bar">
          <button class="icon-btn" id="backButton" type="button" aria-label="Powrót do mapy">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 6 9 12l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <p class="page-header-title">Porozmawiaj z Gwarkiem</p>
          <div aria-hidden="true"></div>
        </div>
      </header>

      <main class="main">
        <section class="hero">
          <div class="hero-image">
            <div class="hero-grid">
              <div class="portrait-shell">
                <div class="portrait" id="portrait" aria-label="Portret Gwarka"></div>
                <button class="hero-audio-btn" id="replayButton" type="button" aria-label="Odtwórz ponownie aktualną kwestię">
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M4 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M8 7v10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M12 4v16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M16 7v10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M20 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                </button>
              </div>

              <div class="hero-copy">
              </div>
            </div>
          </div>
        </section>

        <section class="content">
          <div class="complete-row">
            <button class="complete-btn" id="completeButton" type="button" aria-pressed="false">
              <span class="complete-btn-icon" id="completeButtonIcon">&#x2713;</span>
              <span id="completeButtonLabel">Zako&#324;cz</span>
            </button>
          </div>

          <div class="shell">
            <section class="panel transcript" aria-label="Dialog">
              <div class="transcript-top">
                <div class="eyebrow">
                  <span class="typing" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                  </span>
                  <span id="eyebrowLabel">Gwarek mówi</span>
                </div>
              </div>

              <div class="speech">
                <p id="minerText">Ładowanie dialogu...</p>
                <div class="speech-quote" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M7.4 18C4.98 18 3 16.02 3 13.6c0-2.22 1.64-4.06 3.78-4.36.26-2.76 2.54-4.94 5.36-4.94v2c-2.04 0-3.7 1.66-3.7 3.7v.6h1.16c1.87 0 3.4 1.53 3.4 3.4S9.27 18 7.4 18Zm9 0c-2.42 0-4.4-1.98-4.4-4.4 0-2.22 1.64-4.06 3.78-4.36.26-2.76 2.54-4.94 5.36-4.94v2c-2.04 0-3.7 1.66-3.7 3.7v.6h1.16c1.87 0 3.4 1.53 3.4 3.4S18.27 18 16.4 18Z" />
                  </svg>
                </div>
              </div>

              <div class="choices" id="options" aria-live="polite"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script type="module">
      const params = new URLSearchParams(window.location.search);
      const poiId = params.get("poiId");
      const dialogueFile = (params.get("dialogue") || "").trim();
      const dialogueBaseName = dialogueFile.replace(/\.json$/i, "");
      const DIALOGUE_URL = dialogueFile
        ? new URL(`dialoguetrees/${dialogueFile}`, window.location.href).toString()
        : "";
      const DIALOGUE_AUDIO_DIR = dialogueBaseName
        ? new URL(`dialoguetrees/${dialogueBaseName}/`, window.location.href).toString()
        : "";
      const minerImageUrl = poiId ? new URL(`./assets/statues/${poiId}.jpg`, window.location.href).toString() : "";

      const elements = {
        backButton: document.getElementById("backButton"),
        completeButton: document.getElementById("completeButton"),
        completeButtonLabel: document.getElementById("completeButtonLabel"),
        replayButton: document.getElementById("replayButton"),
        portrait: document.getElementById("portrait"),
        eyebrowLabel: document.getElementById("eyebrowLabel"),
        minerText: document.getElementById("minerText"),
        options: document.getElementById("options")
      };

      let dialogue = null;
      let orderedNodeIds = [];
      let currentNodeId = "start";
      let currentAudio = null;
      let currentAudioSource = "";
      let overlayState = { isComplete: false };

      function postToParent(message) {
        if (window.parent === window) return false;
        window.parent.postMessage(message, window.location.origin);
        return true;
      }

      function safeGetNode(id) {
        if (!dialogue || typeof dialogue !== "object") return null;
        return dialogue[id] || null;
      }

      function normalizeText(text) {
        return String(text || "")
          .replace(/Tarnowskie G\S*ry/g, "Tarnowskie Gory")
          .replace(/Ordunek G\S*rny/g, "Ordunek Gorny");
      }

      function setPortraitImage() {
        if (!minerImageUrl) return;
        const portraitImage = new Image();
        portraitImage.addEventListener("load", () => {
          elements.portrait.style.backgroundImage =
            `linear-gradient(180deg, rgba(246, 211, 0, 0.08), rgba(246, 211, 0, 0)), url("${minerImageUrl.replaceAll('"', '\\"')}")`;
        });
        portraitImage.addEventListener("error", () => {
          elements.portrait.style.backgroundImage =
            "linear-gradient(180deg, rgba(246, 211, 0, 0.14), rgba(246, 211, 0, 0)), #231b0f";
        });
        portraitImage.src = minerImageUrl;
      }

      function setSpeaking(isSpeaking) {
        elements.portrait.classList.toggle("is-speaking", isSpeaking);
        elements.eyebrowLabel.textContent = isSpeaking ? "Gwarek mówi" : "Wybierz kolejną odpowiedź";
      }

      function stopCurrentAudio() {
        if (!currentAudio) {
          setSpeaking(false);
          return;
        }

        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
        currentAudioSource = "";
        setSpeaking(false);
      }

      function resolveAudioFile(node) {
        if (!node || typeof node.audio_file !== "string" || !node.audio_file.trim()) return "";
        return node.audio_file.trim();
      }

      function playNodeAudio(nodeId, node, { forceReplay = false } = {}) {
        const audioFile = resolveAudioFile(node);
        if (!audioFile || !DIALOGUE_AUDIO_DIR) {
          stopCurrentAudio();
          return;
        }

        const audioSrc = new URL(audioFile, DIALOGUE_AUDIO_DIR).toString();
        if (!currentAudio || currentAudioSource !== audioSrc) {
          stopCurrentAudio();
          currentAudio = new Audio(audioSrc);
          currentAudioSource = audioSrc;
          currentAudio.addEventListener(
            "ended",
            () => {
              currentAudio = null;
              currentAudioSource = "";
              setSpeaking(false);
            },
            { once: true }
          );
        }

        if (forceReplay || currentAudioSource === audioSrc) currentAudio.currentTime = 0;
        setSpeaking(true);
        currentAudio.play().catch((error) => {
          setSpeaking(false);
          console.debug("Audio playback blocked or failed.", error);
        });
      }

      function syncCompleteButton(isComplete) {
        const label = isComplete ? "Uko\u0144czono" : "Zako\u0144cz";
        elements.completeButton.classList.toggle("is-complete", isComplete);
        elements.completeButton.setAttribute("aria-pressed", isComplete ? "true" : "false");
        elements.completeButtonLabel.textContent = label;
      }

      function clearOptions() {
        while (elements.options.firstChild) elements.options.removeChild(elements.options.firstChild);
      }

      function setNode(nextId) {
        const node = safeGetNode(nextId);
        currentNodeId = node ? nextId : dialogue && dialogue.end ? "end" : "start";
        render();
      }

      function addOptionButton(option, index, total) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.innerHTML = `
          <span class="choice-copy">
            <strong>${option.text}</strong>
          </span>
          <span class="choice-arrow" aria-hidden="true">&rsaquo;</span>
        `;
        btn.addEventListener("click", () => {
          stopCurrentAudio();
          setNode(option.next);
        });
        elements.options.appendChild(btn);
      }

      function renderMissingState() {
        stopCurrentAudio();
        clearOptions();
        elements.minerText.textContent = "Nie znaleziono węzła dialogu. Rozpocznij rozmowę od nowa.";
        addOptionButton({ text: "Rozpocznij rozmowę od nowa", next: "start" }, 0, 1);
      }

      function render() {
        const node = safeGetNode(currentNodeId);
        if (!node) {
          renderMissingState();
          return;
        }

        elements.minerText.textContent = normalizeText(node.text);

        clearOptions();
        const rawOptions = Array.isArray(node.options) ? node.options : [];
        const validOptions = rawOptions.filter((option) => option && typeof option.text === "string" && typeof option.next === "string");

        if (validOptions.length === 0) {
          addOptionButton({ text: "Rozpocznij rozmowę od nowa", next: "start" }, 0, 1);
        } else {
          validOptions.forEach((option, index) => {
            addOptionButton({ text: normalizeText(option.text), next: option.next }, index, validOptions.length);
          });
        }

        playNodeAudio(currentNodeId, node);
      }

      async function init() {
        setPortraitImage();
        postToParent({ type: "poi-overlay-request-state" });

        try {
          if (!DIALOGUE_URL) {
            throw new Error("Missing dialogue JSON parameter.");
          }

          const response = await fetch(DIALOGUE_URL, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          dialogue = await response.json();
          orderedNodeIds = Object.keys(dialogue || {});
          currentNodeId = dialogue.start ? "start" : orderedNodeIds[0] || "start";
          render();
        } catch (error) {
          console.error(error);
          stopCurrentAudio();
          elements.minerText.textContent = "Nie udało się wczytać dialogu Gwarka. Sprawdź, czy plik JSON jest obecny i poprawnie serwowany.";
          clearOptions();
          addOptionButton({ text: "Spróbuj ponownie", next: "start" }, 0, 1);
        }
      }

      elements.backButton.addEventListener("click", () => {
        stopCurrentAudio();
        const sentToParent = postToParent({ type: "poi-overlay-close" });
        if (!sentToParent && window.history.length > 1) {
          window.history.back();
        }
      });

      elements.completeButton.addEventListener("click", () => {
        postToParent({ type: "poi-overlay-toggle-complete" });
      });

      elements.replayButton.addEventListener("click", () => {
        const node = safeGetNode(currentNodeId);
        if (!node) return;
        playNodeAudio(currentNodeId, node, { forceReplay: true });
      });

      window.addEventListener("message", (event) => {
        if (event.origin !== window.location.origin) return;

        const { data } = event;
        if (!data || typeof data.type !== "string") return;

        if (data.type === "poi-overlay-stop-media") {
          stopCurrentAudio();
          return;
        }

        if (data.type === "poi-overlay-state") {
          overlayState = { ...overlayState, isComplete: Boolean(data.isComplete) };
          syncCompleteButton(overlayState.isComplete);
        }
      });

      window.addEventListener("pagehide", stopCurrentAudio);
      init();
    </script>
  </body>
</html>
